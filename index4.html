<!DOCTYPE html>

<html lang="he" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Tab Switcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .tabs {
            display: inline-flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #ddd;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 16px;
        }

        .tab-btn:hover {
            background-color: #bbb;
        }

        .tab-btn.active {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }

        #display {
            margin-top: 30px;
            padding: 20px;
            background-color: white;
            border: 2px solid #3498db;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            min-height: 60px;
            max-width: 500px;
            margin-inline: auto;
        }
    </style>
</head>
<body>

    <h2>choose a tab</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab(0)"></button>
        <button class="tab-btn" onclick="showTab(1)"></button>
        <button class="tab-btn" onclick="showTab(2)"></button>
    </div>

    <div id="display"></div>

    <script>

        const tabTexts = [
            "ברוך הבא לאתר!",
            "כאן יש מידע נוסף.",
            "צור קשר: email@example.com"
        ];

        function showTab(index) {
            const element = document.querySelector("#display");
            element.innerText = tabTexts[index];
            element.className = "#display"
            const currentActiveBtn = document.querySelector(".tab-btn.active");
        }

    </script>

</body>
</html>
